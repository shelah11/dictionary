<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Merchant Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        main {
            padding-top: 2rem;
            max-width: 800px;
        }

        .tab-state,
        .tab-content {
            display: none;
        }

        .menu-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }

        .tab-label {
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            margin-bottom: -1px;
            border-bottom: 2px solid transparent;
        }

        #tab1:checked~.menu-container label[for="tab1"],
        #tab2:checked~.menu-container label[for="tab2"] {
            border-bottom-color: var(--pico-primary);
            color: var(--pico-primary);
            font-weight: bold;
        }

        #tab1:checked~#content-dictionary,
        #tab2:checked~#content-translator {
            display: block;
        }
    </style>
</head>

<body>
    <main class="container">
        <input type="radio" name="tabs" id="tab1" class="tab-state" {{if eq .ActiveTab "1" }}checked{{end}}>
        <input type="radio" name="tabs" id="tab2" class="tab-state" {{if eq .ActiveTab "2" }}checked{{end}}>

        <div class="menu-container">
            <label for="tab1" class="tab-label">Dictionary</label>
            <label for="tab2" class="tab-label">Shakespearean</label>
        </div>

        <section id="content-dictionary" class="tab-content">
            <form action="/definition" method="GET">
                <fieldset role="group">
                    <input name="word" type="text" placeholder="Search...">
                    <input type="submit" value="Definition">
                </fieldset>
            </form>
            {{if .Data.Definitions}}
            <article>
                <header>Definitions</header>
                <ul>
                    {{range .Data.Definitions}}
                    <li>{{.}}</li>
                    {{end}}
                </ul>
            </article>
            {{else if .Data.Error}}
            <p style="color:red">{{.Data.Error}}</p>
            {{end}}
        </section>

        <section id="content-translator" class="tab-content">
            <form action="/translate" method="POST">
                <label for="translate-input">Modern English</label>
                <textarea name="translate-input" id="translate-input" rows="4">{{.Data.Sentence}}</textarea>
                <button type="submit">Translate</button>
            </form>

            {{if or .Data.Translation .Data.Error}}
            <article>
                <header>Result</header>
                {{if .Data.Translation}}<p><i>{{.Data.Translation}}</i></p>{{end}}
                {{if .Data.Error}}<p style="color:red">{{.Data.Error}}</p>{{end}}
            </article>
            {{end}}
        </section>
    </main>
</body>

</html>
